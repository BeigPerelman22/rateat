<header class="sticky top-0 z-10 border-b border-neutral-200 bg-white/80 backdrop-blur">
  <div class="mx-auto flex max-w-3xl items-center justify-between px-4 py-3">
    <a routerLink="/restaurants" class="flex items-center gap-2 text-brand-600 font-semibold">
      <span class="text-xl">🍽️</span>
      <span class="tracking-tight">rateat</span>
    </a>

    <nav class="flex items-center gap-1 text-sm">
      <a
        routerLink="/restaurants"
        routerLinkActive="bg-brand-50 text-brand-700"
        class="rounded-md px-3 py-1.5 text-neutral-600 hover:bg-neutral-100"
      >
        Places
      </a>
      <a
        routerLink="/partners"
        routerLinkActive="bg-brand-50 text-brand-700"
        class="rounded-md px-3 py-1.5 text-neutral-600 hover:bg-neutral-100"
      >
        Partners
      </a>

      @if (authStore.appUser(); as currentUser) {
        <button
          type="button"
          (click)="signOut()"
          class="ml-2 flex items-center gap-2 rounded-md px-2 py-1 text-neutral-500 hover:bg-neutral-100"
          [attr.aria-label]="'Sign out ' + currentUser.displayName"
        >
          @if (currentUser.photoURL) {
            <img
              [src]="currentUser.photoURL"
              [alt]="currentUser.displayName"
              class="h-7 w-7 rounded-full border border-neutral-200"
            />
          } @else {
            <span
              class="flex h-7 w-7 items-center justify-center rounded-full bg-brand-100 text-xs font-semibold text-brand-700"
            >
              {{ buildInitials(currentUser.displayName) }}
            </span>
          }
        </button>
      }
    </nav>
  </div>
</header>
