<header class="sticky top-0 z-10 border-b border-neutral-200 bg-white/80 backdrop-blur">
  <div class="mx-auto flex max-w-3xl items-center justify-between px-4 py-3">
    <a routerLink="/restaurants" class="flex items-center gap-2 text-brand-600 font-semibold">
      <span class="text-xl">🍽️</span>
      <span class="tracking-tight">rateat</span>
    </a>

    <nav class="flex items-center gap-1 text-sm">
      <a
        routerLink="/restaurants"
        routerLinkActive="bg-brand-50 text-brand-700"
        class="rounded-md px-3 py-1.5 text-neutral-600 hover:bg-neutral-100"
      >
        Places
      </a>
      <a
        routerLink="/categories"
        routerLinkActive="bg-brand-50 text-brand-700"
        class="rounded-md px-3 py-1.5 text-neutral-600 hover:bg-neutral-100"
      >
        Categories
      </a>
      <a
        routerLink="/partners"
        routerLinkActive="bg-brand-50 text-brand-700"
        class="rounded-md px-3 py-1.5 text-neutral-600 hover:bg-neutral-100"
      >
        Partners
      </a>

      @if (authStore.appUser(); as currentUser) {
        <div class="relative ml-2">
          <button
            type="button"
            (click)="toggleDropdown()"
            class="flex items-center gap-2 rounded-md px-2 py-1 text-neutral-500 hover:bg-neutral-100"
            [attr.aria-label]="'Account menu for ' + currentUser.displayName"
            [attr.aria-expanded]="isDropdownOpen()"
          >
            @if (currentUser.photoURL && !imageLoadError()) {
              <img
                [src]="currentUser.photoURL"
                [alt]="currentUser.displayName"
                (error)="onImageError()"
                class="h-7 w-7 rounded-full border border-neutral-200"
              />
            } @else {
              <span
                class="flex h-7 w-7 items-center justify-center rounded-full bg-brand-100 text-xs font-semibold text-brand-700"
              >
                {{ buildInitials(currentUser.displayName) }}
              </span>
            }
          </button>

          @if (isDropdownOpen()) {
            <div
              class="absolute right-0 mt-1 w-48 rounded-md border border-neutral-200 bg-white shadow-lg"
              role="menu"
            >
              <div class="px-4 py-3 border-b border-neutral-100">
                <p class="text-sm font-medium text-neutral-900">{{ currentUser.displayName }}</p>
                <p class="text-xs text-neutral-500">{{ currentUser.email }}</p>
              </div>
              <button
                type="button"
                (click)="signOut()"
                class="w-full px-4 py-2 text-left text-sm text-neutral-700 hover:bg-neutral-50"
                role="menuitem"
              >
                Sign Out
              </button>
            </div>
          }
        </div>
      }
    </nav>
  </div>
</header>
