<div class="flex min-h-dvh flex-col items-center justify-center bg-gradient-to-br from-brand-50 to-white px-6">
  <div class="w-full max-w-sm rounded-2xl border border-neutral-200 bg-white p-8 shadow-sm">
    <div class="mb-6 text-center">
      <div class="text-4xl">🍽️</div>
      <h1 class="mt-3 text-2xl font-semibold tracking-tight text-neutral-900">rateat</h1>
      <p class="mt-2 text-sm text-neutral-500">
        Your private restaurant rating &amp; memory journal.
      </p>
    </div>

    <app-button [full]="true" [disabled]="isSigningIn()" (click)="signIn()">
      @if (isSigningIn()) {
        Signing in…
      } @else {
        <svg class="h-4 w-4" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M21.35 11.1h-9.18v2.92h5.27c-.23 1.4-1.67 4.1-5.27 4.1-3.17 0-5.77-2.62-5.77-5.85s2.6-5.86 5.77-5.86c1.8 0 3.02.77 3.71 1.43l2.53-2.44C16.9 3.94 14.8 3 12.17 3 6.96 3 2.75 7.2 2.75 12.4s4.21 9.4 9.42 9.4c5.43 0 9.02-3.82 9.02-9.2 0-.62-.07-1.09-.15-1.5Z"/>
        </svg>
        Sign in with Google
      }
    </app-button>

    @if (signInErrorMessage()) {
      <p class="mt-4 text-sm text-red-600">{{ signInErrorMessage() }}</p>
    }

    <p class="mt-6 text-center text-xs text-neutral-400">
      Private by design. Data syncs only between you and partners you add.
    </p>
  </div>
</div>
