<div class="space-y-3">
  <div class="flex items-center justify-between">
    <span class="text-sm font-medium text-neutral-700">Rating parameters</span>
    <button
      type="button"
      (click)="addParameter()"
      class="rounded-lg border border-neutral-200 bg-white px-3 py-1.5 text-sm text-neutral-700 transition hover:border-brand-300 hover:text-brand-700"
    >
      <span aria-hidden="true">＋</span> Add parameter
    </button>
  </div>

  @if (parameters.length === 0) {
    <p class="text-xs text-neutral-400">No parameters yet. Add one to define how items are rated.</p>
  } @else {
    <ul class="space-y-2">
      @for (param of parameters; track param.id; let i = $index) {
        <li class="flex items-center gap-2">
          <input
            type="text"
            [value]="param.label"
            (input)="updateLabel(i, $any($event.target).value)"
            placeholder="e.g. Taste, Atmosphere"
            class="min-w-0 flex-1 rounded-lg border border-neutral-200 bg-white px-3 py-2 text-sm focus:border-brand-500 focus:outline-none focus:ring-2 focus:ring-brand-200"
          />
          <select
            [value]="param.scale"
            (change)="updateScale(i, +$any($event.target).value)"
            class="rounded-lg border border-neutral-200 bg-white px-2 py-2 text-sm focus:border-brand-500 focus:outline-none focus:ring-2 focus:ring-brand-200"
          >
            @for (option of scaleOptions; track option) {
              <option [value]="option" [selected]="param.scale === option">/ {{ option }}</option>
            }
          </select>
          <button
            type="button"
            (click)="removeParameter(i)"
            class="rounded-lg border border-neutral-200 bg-white px-2 py-2 text-sm text-neutral-500 transition hover:border-red-300 hover:text-red-600"
            aria-label="Remove parameter"
          >
            ✕
          </button>
        </li>
      }
    </ul>
  }
</div>
