<div class="rounded-xl border border-neutral-200 bg-white p-4">
  <div class="flex items-start justify-between gap-3">
    <div class="min-w-0 flex-1">
      <div class="flex items-center gap-2 text-sm text-neutral-500">
        <span>{{ visit().visitedAt?.toDate() | date: 'mediumDate' }}</span>
      </div>
      @if (visit().notes) {
        <p class="mt-2 whitespace-pre-wrap text-sm text-neutral-800">{{ visit().notes }}</p>
      }
      <div class="mt-3 grid grid-cols-2 gap-x-4 gap-y-1 text-xs text-neutral-500 sm:grid-cols-4">
        <div>Food <span class="ml-1 font-medium text-neutral-800">{{ visit().food || '—' }}</span></div>
        <div>Service <span class="ml-1 font-medium text-neutral-800">{{ visit().service || '—' }}</span></div>
        <div>Ambiance <span class="ml-1 font-medium text-neutral-800">{{ visit().ambiance || '—' }}</span></div>
        <div>Value <span class="ml-1 font-medium text-neutral-800">{{ visit().value || '—' }}</span></div>
      </div>
    </div>
    <div class="flex flex-col items-end gap-2">
      <app-rating-display [value]="visit().overall" />
      @if (canEdit()) {
        <a
          [routerLink]="['/restaurants', restaurantId(), 'visits', visit().id, 'edit']"
          class="text-xs text-brand-600 hover:underline"
        >Edit</a>
      }
    </div>
  </div>
</div>
