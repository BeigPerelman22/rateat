<div class="space-y-6">
  <header>
    <h1 class="text-2xl font-semibold tracking-tight">
      {{ isEditing() ? 'Edit visit' : 'New visit' }}
    </h1>
  </header>

  <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-5">
    <div>
      <label class="block text-sm font-medium text-neutral-700">Date</label>
      <input
        type="date"
        formControlName="visitedAt"
        class="mt-1 w-full rounded-lg border border-neutral-200 bg-white px-3 py-2 text-sm focus:border-brand-500 focus:outline-none focus:ring-2 focus:ring-brand-200 sm:w-64"
      />
    </div>

    <div class="rounded-xl border border-neutral-200 bg-white p-4">
      <div class="flex items-center justify-between">
        <span class="text-sm font-medium text-neutral-700">Overall</span>
        <app-rating-input formControlName="overall" label="Overall rating" />
      </div>
      <div class="mt-3 grid gap-3 border-t border-neutral-100 pt-3 sm:grid-cols-2">
        <div class="flex items-center justify-between">
          <span class="text-sm text-neutral-600">Food</span>
          <app-rating-input formControlName="food" label="Food rating" />
        </div>
        <div class="flex items-center justify-between">
          <span class="text-sm text-neutral-600">Service</span>
          <app-rating-input formControlName="service" label="Service rating" />
        </div>
        <div class="flex items-center justify-between">
          <span class="text-sm text-neutral-600">Ambiance</span>
          <app-rating-input formControlName="ambiance" label="Ambiance rating" />
        </div>
        <div class="flex items-center justify-between">
          <span class="text-sm text-neutral-600">Value</span>
          <app-rating-input formControlName="value" label="Value rating" />
        </div>
      </div>
    </div>

    <div>
      <label class="block text-sm font-medium text-neutral-700">Memory / notes</label>
      <textarea
        formControlName="notes"
        rows="4"
        class="mt-1 w-full rounded-lg border border-neutral-200 bg-white px-3 py-2 text-sm focus:border-brand-500 focus:outline-none focus:ring-2 focus:ring-brand-200"
        placeholder="What made this visit memorable?"
      ></textarea>
    </div>

    @if (saveError()) {
      <p class="text-sm text-red-600">{{ saveError() }}</p>
    }

    <div class="flex gap-2 pt-2">
      <app-button type="submit" [disabled]="form.invalid || isSaving()">
        @if (isSaving()) { Saving… } @else { Save visit }
      </app-button>
      <app-button variant="ghost" (click)="cancel()">Cancel</app-button>
      @if (isEditing()) {
        <span class="ml-auto"></span>
        <app-button variant="danger" (click)="remove()">Delete</app-button>
      }
    </div>
  </form>
</div>
